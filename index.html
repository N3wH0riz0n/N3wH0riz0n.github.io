/* =============================================
   CUBIC BLOCK DESIGN - Charcoal & Lime Green
   ============================================= */
:root {
  --charcoal:  #2a2a2a;
  --charcoal-light: #3d3d3d;
  --grey:      #4a4a4a;
  --brown:     #b8752b;
  --sage:      #a8d5a8;
  --tan:       #d4a574;
  --forest:    #4a7c3a;
  --forest-light: #5a9c4a;
  --text:      #ffffff;
  --text-dark: #2a2a2a;
  --mono:      'IBM Plex Mono', monospace;
  --sans:      'Space Mono', monospace;
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--charcoal);color:var(--text);font-family:var(--mono);font-size:15px;line-height:1.6;min-height:100vh}

.page{display:none;opacity:0;transition:opacity 0.4s}
.page.active{display:block;opacity:1}

/* ── NAV ── */
nav{
  position:sticky;top:0;z-index:200;
  background:var(--charcoal);border-bottom:8px solid var(--sage);
  display:flex;align-items:center;padding:0;height:80px;
}
.nav-brand{
  font-family:var(--sans);font-size:1.4rem;font-weight:700;
  color:var(--sage);margin-left:2rem;margin-right:auto;
  letter-spacing:0.05em;cursor:pointer;text-transform:uppercase;
}
.nav-brand span{color:var(--forest-light);font-weight:400}
.nav-links{display:flex;height:100%}
.nav-links button{
  background:transparent;border:none;color:var(--text);
  font-family:var(--sans);font-size:0.75rem;font-weight:700;
  letter-spacing:0.12em;text-transform:uppercase;
  padding:0 1.8rem;height:100%;cursor:pointer;
  border-bottom:8px solid transparent;transition:all 0.2s;
  position:relative;
}
.nav-links button:hover{background:var(--charcoal-light);border-bottom-color:var(--sage)}
.nav-links button.active{background:var(--forest);color:var(--sage);border-bottom-color:var(--sage)}

/* ── HERO ── */
.hero{
  display:grid;grid-template-columns:1fr 1fr;gap:0;min-height:calc(100vh - 80px);
  background:var(--charcoal);
}
.hero-block{background:linear-gradient(135deg,var(--forest) 0%,var(--forest-light) 100%);padding:4rem;display:flex;flex-direction:column;justify-content:center}
.hero-content{background:var(--charcoal);padding:4rem;border:8px solid var(--sage);display:flex;flex-direction:column;justify-content:center;position:relative}
.hero-tag{
  display:inline-block;background:var(--tan);color:var(--text-dark);
  font-family:var(--sans);font-size:0.7rem;font-weight:700;
  letter-spacing:0.15em;text-transform:uppercase;padding:0.8rem 1.2rem;
  margin-bottom:1.5rem;width:fit-content;border:4px solid var(--text-dark);
}
.hero-name{
  font-family:var(--sans);font-size:3rem;font-weight:700;
  line-height:1;margin-bottom:1rem;color:var(--sage);letter-spacing:-0.02em;
}
.hero-name em{color:var(--forest-light);font-style:normal;font-weight:400}
.hero-sub{
  color:var(--text);font-size:0.95rem;margin-bottom:2rem;
  font-weight:400;letter-spacing:0.02em;
}
.hero-cta{display:flex;gap:1rem;margin-top:auto}
.btn{
  padding:1rem 1.8rem;border:4px solid var(--brown);background:var(--brown);
  color:var(--text);font-family:var(--sans);font-size:0.8rem;
  font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
  cursor:pointer;transition:all 0.2s;flex:1;text-align:center;
}
.btn:hover{background:var(--forest);border-color:var(--forest);color:var(--sage)}
.btn-ghost{background:transparent;color:var(--text);border-color:var(--text)}
.btn-ghost:hover{background:var(--text);color:var(--charcoal)}

/* ── STATS BLOCKS ── */
.stats-row{
  display:grid;grid-template-columns:repeat(4,1fr);gap:0;
  background:var(--charcoal);padding:2rem;max-width:1200px;margin:2rem auto;
}
.stat{
  background:var(--forest);padding:2rem;border:6px solid var(--sage);
  text-align:center;border-right:none;
}
.stat:last-child{border-right:6px solid var(--sage)}
.stat-num{
  font-family:var(--sans);font-size:2.5rem;color:var(--sage);
  display:block;margin-bottom:0.5rem;font-weight:700;
}
.stat-label{
  font-size:0.75rem;color:var(--text);text-transform:uppercase;
  letter-spacing:0.1em;font-weight:600;
}

/* ── ABOUT ── */
.about-section{
  max-width:1200px;margin:0 auto;padding:3rem 2rem;
  display:grid;grid-template-columns:1fr 1fr;gap:2rem;
}
.about-box{
  background:var(--forest);padding:2.5rem;border:6px solid var(--sage);
}
.about-label{
  font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;
  color:var(--sage);margin-bottom:1rem;font-weight:700;
}
.about-heading{
  font-family:var(--sans);font-size:1.8rem;line-height:1.2;
  margin-bottom:1.5rem;color:var(--sage);font-weight:700;
}
.about-text{
  color:var(--text);font-weight:400;font-size:0.9rem;
  margin-bottom:1rem;line-height:1.8;
}
.skills-grid{display:flex;flex-wrap:wrap;gap:0.8rem;margin-top:1.5rem}
.skill-pill{
  background:var(--sage);color:var(--text-dark);
  font-size:0.75rem;padding:0.6rem 1rem;
  border:3px solid var(--text-dark);font-weight:700;
  letter-spacing:0.08em;text-transform:uppercase;
}

/* ── PAGE HEADER ── */
.page-header{
  padding:3rem 2rem;background:var(--brown);border-bottom:8px solid var(--sage);
  color:var(--text);text-align:center;
}
.page-header-tag{
  display:inline-block;background:var(--sage);color:var(--text-dark);
  font-family:var(--sans);font-size:0.7rem;font-weight:700;
  letter-spacing:0.15em;text-transform:uppercase;padding:0.6rem 1rem;
  margin-bottom:1.5rem;border:4px solid var(--text-dark);
}
.page-header h1{
  font-family:var(--sans);font-size:2.8rem;font-weight:700;
  letter-spacing:-0.01em;color:var(--sage);
}

/* ── PCR ── */
.pcr-main{max-width:1200px;margin:0 auto;padding:3rem 2rem 6rem}
.category-block{margin-bottom:3rem}
.category-header{
  display:grid;grid-template-columns:120px 1fr;gap:0;
  background:linear-gradient(90deg,var(--tan) 0%,var(--tan) 100%);
  border:6px solid var(--charcoal);margin-bottom:2rem;

.cat-num{
  background:var(--brown);color:var(--tan);font-family:var(--sans);
  font-size:3rem;font-weight:700;display:flex;align-items:center;
  justify-content:center;border-right:6px solid var(--charcoal);
}
.cat-title{
  background:var(--tan);color:var(--brown);font-family:var(--sans);
  font-size:1.4rem;font-weight:700;padding:1.5rem;display:flex;
  align-items:center;letter-spacing:0.02em;
}

.entry{
  background:var(--charcoal-light);padding:2rem;border:6px solid var(--brown);
  margin-bottom:2rem;
}
.entry-date{
  font-size:0.75rem;color:var(--sage);text-transform:uppercase;
  letter-spacing:0.12em;margin-bottom:0.8rem;font-weight:700;
}
.entry-title{
  font-family:var(--sans);font-size:1.2rem;color:var(--tan);
  margin-bottom:1.2rem;font-weight:700;letter-spacing:0.02em;
}
.entry-text{
  color:var(--text);font-size:0.9rem;line-height:1.8;font-weight:400;
}

.final-reflection{
  background:var(--brown);padding:2.5rem;border:6px solid var(--tan);
  color:var(--text);margin-top:4rem;
}
.final-reflection h3{
  font-family:var(--sans);font-size:1.4rem;margin-bottom:1.5rem;
  color:var(--tan);font-weight:700;
}
.final-reflection p{font-size:0.9rem;line-height:1.8;font-weight:400}

.honesty-statement{
  background:var(--charcoal-light);padding:2rem;border:6px solid var(--sage);
  margin-top:3rem;font-size:0.85rem;color:var(--text);font-style:normal;
  line-height:1.7;font-weight:400;
}

/* ── RESUME ── */
.resume-main{max-width:1200px;margin:0 auto;padding:3rem 2rem 6rem}
.r-section{margin-bottom:3rem}
.r-label{
  font-family:var(--sans);font-size:1.1rem;letter-spacing:0.12em;
  text-transform:uppercase;color:var(--text);background:var(--brown);
  padding:1.2rem 1.5rem;margin-bottom:1.5rem;border:6px solid var(--tan);
  font-weight:700;
}
.r-item{
  background:var(--charcoal-light);padding:1.8rem;border:6px solid var(--brown);
  margin-bottom:1.5rem;
}
.r-role{
  font-family:var(--sans);font-size:1.1rem;color:var(--tan);font-weight:700;
}
.r-org{font-size:0.9rem;color:var(--forest-light);margin-top:0.4rem;font-weight:600}
.r-date{font-size:0.8rem;color:var(--text);margin-top:0.5rem;letter-spacing:0.05em}
.r-desc{font-size:0.85rem;color:var(--text);font-weight:400;margin-top:1rem;line-height:1.7}
.r-desc ul{padding-left:1.5rem;margin-top:0.8rem}
.r-desc ul li{margin-bottom:0.4rem}
.r-skills{display:flex;flex-wrap:wrap;gap:0.8rem;margin-top:1rem}
.r-skill{
  background:var(--brown);color:var(--tan);font-size:0.8rem;
  padding:0.6rem 1rem;border:3px solid var(--tan);font-weight:700;
  letter-spacing:0.08em;text-transform:uppercase;
}
.r-contact{display:flex;flex-wrap:wrap;gap:1.5rem;margin-bottom:2rem}
.r-contact a{
  color:var(--tan);font-size:0.9rem;text-decoration:none;
  display:flex;align-items:center;gap:0.5rem;font-weight:600;
  border:4px solid var(--tan);padding:0.8rem 1.2rem;
  background:transparent;cursor:pointer;transition:all 0.2s;
  font-family:var(--mono);
}
.r-contact a:hover{background:var(--sage);color:var(--charcoal)}

footer{
  border-top:8px solid var(--sage);padding:2.5rem;text-align:center;
  font-size:0.85rem;color:var(--text);background:var(--charcoal);
  font-weight:600;letter-spacing:0.05em;
}

@media(max-width:900px){
  .hero{grid-template-columns:1fr}
  .hero-block{display:none}
  .about-section{grid-template-columns:1fr;gap:1.5rem}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .stat{border-right:6px solid var(--sage)}
  .stat:nth-child(2n){border-right:none}
  .category-header{grid-template-columns:80px 1fr}
  .cat-num{font-size:2rem}
}
@media(max-width:640px){
  .stats-row{grid-template-columns:1fr}
  .stat{border-right:6px solid var(--sage)}
  .nav-links button{padding:0 1rem;font-size:0.65rem}
}
</style>

<nav id="nav"></nav>
<div id="page-home" class="page"></div>
<div id="page-pcr" class="page"></div>
<div id="page-resume" class="page"></div>
<footer id="footer"></footer>

<script>
const D = JSON.parse(document.getElementById('data').textContent);

function go(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-links button').forEach(b => b.classList.remove('active'));
  const pg = document.getElementById('page-' + id);
  pg.classList.remove('active');
  void pg.offsetWidth;
  pg.classList.add('active');
  document.querySelector('[data-page="' + id + '"]').classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

const nav = document.getElementById('nav');
const brand = document.createElement('div');
brand.className = 'nav-brand';
const parts = D.name.split(' ');
brand.innerHTML = parts[0] + ' <span>' + parts.slice(1).join(' ') + '</span>';
brand.onclick = () => go('home');
nav.appendChild(brand);

const nl = document.createElement('div');
nl.className = 'nav-links';
[{id:'home',label:'Home'},{id:'pcr',label:'PCR Activities'},{id:'resume',label:'Resume'}].forEach(p => {
  const b = document.createElement('button');
  b.textContent = p.label;
  b.dataset.page = p.id;
  b.onclick = () => go(p.id);
  nl.appendChild(b);
});
nav.appendChild(nl);

document.getElementById('page-home').innerHTML = `
  <div class="hero">
    <div class="hero-block"></div>
    <div class="hero-content">
      <div class="hero-tag">PORTFOLIO</div>
      <h1 class="hero-name">${parts[0]} <em>${parts.slice(1).join(' ')}</em></h1>
      <p class="hero-sub">${D.heroSubtitle}</p>
      <div class="hero-cta">
        <button class="btn" onclick="go('pcr')">PCR Activities</button>
        <button class="btn btn-ghost" onclick="go('resume')">Resume</button>
      </div>
    </div>
  </div>
  <div class="stats-row">${D.stats.map(s=>`<div class="stat"><div class="stat-num">${s.num}</div><div class="stat-label">${s.label}</div></div>`).join('')}</div>
  <div class="about-section">
    <div class="about-box">
      <p class="about-label">ABOUT</p>
      <h2 class="about-heading">${D.aboutHeading}</h2>
    </div>
    <div class="about-box">
      ${D.aboutText.map(t=>`<p class="about-text">${t}</p>`).join('')}
      <div class="skills-grid">${D.skills.map(s=>`<span class="skill-pill">${s}</span>`).join('')}</div>
    </div>
  </div>
`;

let pcr = `<div class="page-header"><div class="page-header-tag">PORTFOLIO</div><h1>PCR ACTIVITIES</h1></div><div class="pcr-main">`;
D.pcrCategories.forEach((cat,i) => {
  pcr += `<div class="category-block"><div class="category-header"><div class="cat-num">0${i+1}</div><h2 class="cat-title">${cat.title}</h2></div>`;
  cat.entries.forEach(e => {
    pcr += `<div class="entry"><div class="entry-date">${e.date}</div><div class="entry-title">${e.title}</div><p class="entry-text">${e.text}</p></div>`;
  });
  pcr += `</div>`;
});
pcr += `<div class="final-reflection"><h3>PROFESSIONAL REFLECTION</h3><p>${D.finalReflection}</p></div>`;
pcr += `<div class="honesty-statement">${D.disclaimer}</div></div>`;
document.getElementById('page-pcr').innerHTML = pcr;

const R = D.resume;
const C = R.contact;
let res = `<div class="page-header"><div class="page-header-tag">CAREER</div><h1>RÉSUMÉ</h1></div><div class="resume-main"><div class="r-contact">`;
res += `<a href="tel:${C.phone}">${C.phone}</a>`;
res += `<a href="mailto:${C.email}">${C.email}</a>`;
res += `<a href="${C.linkedin}" target="_blank">LINKEDIN</a>`;
res += `</div>`;
res += `<div class="r-section"><div class="r-label">EDUCATION</div>`;
R.education.forEach(e => {
  res += `<div class="r-item"><div class="r-role">${e.role}</div><div class="r-org">${e.org}</div><div class="r-date">${e.date}</div></div>`;
});
res += `</div><div class="r-section"><div class="r-label">EXPERIENCE</div>`;
R.experience.forEach(e => {
  res += `<div class="r-item"><div class="r-role">${e.role}</div><div class="r-org">${e.org}</div><div class="r-date">${e.date}</div><div class="r-desc"><ul>${e.bullets.map(b=>`<li>${b}</li>`).join('')}</ul></div></div>`;
});
res += `</div><div class="r-section"><div class="r-label">SKILLS</div><div class="r-skills">${R.skills.map(s=>`<span class="r-skill">${s}</span>`).join('')}</div></div></div>`;
document.getElementById('page-resume').innerHTML = res;

document.getElementById('footer').innerHTML = `<p>© 2025 ZACHARY CUNNINGHAM · WESTERN WASHINGTON UNIVERSITY</p>`;

go('home');
</script>
</body>
</html>
