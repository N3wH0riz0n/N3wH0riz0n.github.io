<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
/* =============================================
   THEME — Vibrant Forest Green
   ============================================= */
:root {
  --bg:       #0d1910;
  --surface:  #111f16;
  --surface2: #162b1e;
  --border:   #1e3d2a;
  --text:     #e8f0ea;
  --muted:    #4a8a62;
  --accent:   #5ec990;
  --accent-d: rgba(94,201,144,0.10);
  --btn:      #2ea868;
  --display:  'DM Serif Display', Georgia, serif;
  --sans:     'DM Sans', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:16px;line-height:1.75;min-height:100vh}
.page{display:none;animation:rise .42s ease both}
.page.active{display:block}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* NAV */
nav{position:sticky;top:0;z-index:200;background:rgba(13,25,16,.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 2.5rem;height:62px;}
.nav-brand{font-family:var(--display);font-size:1.2rem;color:var(--text);margin-right:auto;cursor:pointer;}
.nav-brand span{color:var(--accent)}
.nav-links{display:flex;gap:.15rem}
.nav-links button{background:none;border:none;color:var(--muted);font-family:var(--sans);font-size:.78rem;font-weight:500;letter-spacing:.11em;text-transform:uppercase;padding:.45rem 1rem;border-radius:6px;cursor:pointer;transition:color .18s,background .18s;}
.nav-links button:hover{color:var(--text);background:var(--surface2)}
.nav-links button.active{color:var(--accent);background:var(--accent-d)}

/* HERO */
.hero{position:relative;min-height:calc(100vh - 62px);display:flex;align-items:center;justify-content:center;overflow:hidden;text-align:center;padding:4rem 2rem;}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.2);}
.hero-overlay{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 60%,transparent 30%,var(--bg) 80%);}
.hero-content{position:relative;max-width:700px}
.hero-tag{display:inline-block;background:var(--accent-d);border:1px solid rgba(94,201,144,.38);color:var(--accent);font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;padding:.32rem .9rem;border-radius:100px;margin-bottom:1.8rem;}
.hero-name{font-family:var(--display);font-size:clamp(2.8rem,8vw,5.2rem);line-height:1.06;letter-spacing:-.01em;margin-bottom:1.1rem;}
.hero-name em{color:var(--accent);font-style:italic}
.hero-sub{color:var(--muted);font-size:1rem;font-weight:300;max-width:520px;margin:0 auto 2.4rem}
.hero-cta{display:inline-flex;gap:.9rem;flex-wrap:wrap;justify-content:center}
.btn{padding:.7rem 1.8rem;border-radius:8px;font-family:var(--sans);font-size:.8rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:none;transition:all .2s;}
.btn-primary{background:var(--btn);color:#0d1910}
.btn-primary:hover{background:#38c076;transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.stat{background:var(--surface);padding:1.8rem;text-align:center}
.stat-num{font-family:var(--display);font-size:2.1rem;color:var(--accent);display:block;line-height:1;margin-bottom:.3rem}
.stat-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.11em}

/* ABOUT */
.about-section{max-width:900px;margin:0 auto;padding:5rem 2rem;display:grid;grid-template-columns:1fr 1.7fr;gap:4rem;align-items:start;}
.about-label{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:.8rem}
.about-heading{font-family:var(--display);font-size:2rem;line-height:1.22}
.about-text{color:var(--muted);font-weight:300;font-size:.95rem;margin-bottom:1rem}
.skills-grid{display:flex;flex-wrap:wrap;gap:.45rem;margin-top:1.4rem}
.skill-pill{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:.76rem;padding:.3rem .85rem;border-radius:100px}

/* PAGE HEADER */
.page-header{position:relative;padding:5rem 2rem 4rem;text-align:center;border-bottom:1px solid var(--border);overflow:hidden;}
.page-header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% -20%,rgba(94,201,144,.06) 0%,transparent 65%);pointer-events:none;}
.page-header-tag{display:inline-block;background:var(--accent-d);border:1px solid rgba(94,201,144,.22);color:var(--accent);font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;padding:.28rem .85rem;border-radius:100px;margin-bottom:1rem;}
.page-header h1{font-family:var(--display);font-size:clamp(2.2rem,5vw,3.4rem);line-height:1.1}

/* PCR */
.pcr-main{max-width:900px;margin:0 auto;padding:3rem 2rem 6rem}
.category-block{margin-bottom:.5rem}
.category-header{display:flex;align-items:center;gap:1.2rem;padding:2.2rem 0 1.2rem;border-bottom:1px solid var(--border);margin-bottom:1.8rem;}
.cat-num{font-family:var(--display);font-size:2.8rem;color:var(--border);line-height:1;flex-shrink:0}
.cat-pts{font-size:.7rem;color:var(--accent);letter-spacing:.14em;text-transform:uppercase;margin-bottom:.15rem}
.cat-title{font-family:var(--display);font-size:1.55rem;color:var(--text)}
.entry{display:grid;grid-template-columns:200px 1fr;gap:2rem;padding:2rem 0;border-bottom:1px solid var(--border);}
.entry:last-child{border-bottom:none}
.entry.flip{grid-template-columns:1fr 200px}
.entry.flip .eimg{order:2}
.entry.flip .econtent{order:1}
.eimg{border-radius:10px;overflow:hidden;background:var(--surface2);border:1px solid var(--border);aspect-ratio:4/3;align-self:start;position:relative;}
.eimg.portrait{aspect-ratio:3/4}
.eimg img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s ease}
.eimg:hover img{transform:scale(1.05)}
.eimg-ph{width:100%;height:100%;min-height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem;color:var(--muted);font-size:.78rem;text-align:center;padding:1rem;}
.e-badge{display:inline-block;background:var(--accent-d);border:1px solid rgba(94,201,144,.2);color:var(--accent);font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;padding:.18rem .65rem;border-radius:100px;margin-bottom:.55rem;}
.e-source{display:inline-block;background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;padding:.18rem .65rem;border-radius:100px;margin-bottom:.55rem;margin-left:.4rem;}
.e-title{font-family:var(--display);font-size:1.1rem;line-height:1.3;margin-bottom:.7rem}
.e-text{color:var(--muted);font-size:.9rem;line-height:1.82;font-weight:300}

/* RESUME */
.resume-main{max-width:820px;margin:0 auto;padding:3rem 2rem 6rem}
.r-section{margin-bottom:3rem}
.r-label{font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:1.2rem;padding-bottom:.6rem;border-bottom:1px solid var(--border);}
.r-item{display:grid;grid-template-columns:1fr auto;gap:.4rem 2rem;padding:1.3rem 0;border-bottom:1px solid var(--surface2);align-items:start;}
.r-item:last-child{border-bottom:none}
.r-role{font-family:var(--display);font-size:1.05rem}
.r-org{font-size:.85rem;color:var(--accent);margin-top:.12rem}
.r-date{font-size:.76rem;color:var(--muted);white-space:nowrap;text-align:right;margin-top:.15rem}
.r-desc{grid-column:1/-1;font-size:.87rem;color:var(--muted);font-weight:300;margin-top:.4rem}
.r-desc ul{padding-left:1.1rem;margin-top:.3rem}
.r-desc ul li{margin-bottom:.25rem}
.r-skills{display:flex;flex-wrap:wrap;gap:.45rem}
.r-skill{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:.78rem;padding:.35rem .9rem;border-radius:100px}
.r-contact{display:flex;flex-wrap:wrap;gap:1rem;margin-bottom:2.5rem;}
.r-contact a{color:var(--accent);font-size:.85rem;text-decoration:none;display:flex;align-items:center;gap:.4rem;transition:opacity .2s}
.r-contact a:hover{opacity:.75}
.r-print{text-align:center;margin-top:2.5rem}
.r-print-note{color:var(--muted);font-size:.82rem;margin-bottom:.9rem}

footer{border-top:1px solid var(--border);padding:1.8rem;text-align:center;font-size:.78rem;color:var(--muted)}

@media(max-width:640px){
  .about-section{grid-template-columns:1fr;gap:2rem}
  .entry,.entry.flip{grid-template-columns:1fr}
  .entry.flip .eimg,.entry.flip .econtent{order:unset}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  nav{padding:0 1rem}
  .nav-brand{font-size:1rem}
  .nav-links button{padding:.38rem .65rem;font-size:.72rem}
}
</style>
</head>

<script>
const D = JSON.parse(document.getElementById('data').textContent);

function go(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-links button').forEach(b => b.classList.remove('active'));
  const pg = document.getElementById('page-' + id);
  pg.classList.remove('active'); void pg.offsetWidth;
  pg.classList.add('active');
  document.querySelector('[data-page="' + id + '"]').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* NAV */
const nav = document.getElementById('nav');
const brand = document.createElement('div');
brand.className = 'nav-brand';
const parts = D.name.split(' ');
brand.innerHTML = parts[0] + ' <span>' + parts.slice(1).join(' ') + '</span>';
brand.onclick = () => go('home');
nav.appendChild(brand);
const nl = document.createElement('div');
nl.className = 'nav-links';
[{id:'home',label:'Home'},{id:'pcr',label:'PCR Activities'},{id:'resume',label:'Resume'}].forEach(p => {
  const b = document.createElement('button');
  b.textContent = p.label; b.dataset.page = p.id; b.onclick = () => go(p.id);
  nl.appendChild(b);
});
nav.appendChild(nl);

/* HOME */
document.getElementById('page-home').innerHTML = `

    <div class="hero-overlay"></div>

      <h1 class="hero-name">${parts[0]} <em>${parts.slice(1).join(' ')}</em></h1>
      <p class="hero-sub">${D.heroSubtitle}</p>
      <div class="hero-cta">
        <button class="btn btn-primary" onclick="go('pcr')">View PCR Activities</button>
        <button class="btn btn-ghost" onclick="go('resume')">View Résumé</button>

  <div class="about-section">
    <div>
      <p class="about-label">About Me</p>
      <h2 class="about-heading">${D.aboutHeading}</h2>
    </div>
    <div>
      ${D.aboutText.map(t=>`<p class="about-text">${t}</p>`).join('')}
      <div class="skills-grid">${D.skills.map(s=>`<span class="skill-pill">${s}</span>`).join('')}</div>
    </div>

`;

/* PCR */
let ph = `<div class="page-header"><div class="page-header-tag">Portfolio</div><h1>PCR Activities</h1></div><div class="pcr-main">`;
D.pcrCategories.forEach((cat, ci) => {
  ph += `<div class="category-block"><div class="category-header"><span class="cat-num">0${ci+1}</span><div><div class="cat-pts">${cat.pts}</div><h2 class="cat-title">${cat.title}</h2></div></div>`;

    const imgEl = e.image
      ? `<div class="eimg${e.portrait?' portrait':''}"><img src="${e.image}" alt="${e.subtitle}" loading="lazy"/></div>`
      : `<div class="eimg${e.portrait?' portrait':''}"><div class="eimg-ph"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" style="opacity:.3"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>Add photo here</div></div>`;

  });
  ph += `</div>`;
});
ph += `<p style="font-size:.8rem;color:var(--muted);margin-top:3rem;padding-top:1.4rem;border-top:1px solid var(--border);font-style:italic">${D.disclaimer}</p></div>`;
document.getElementById('page-pcr').innerHTML = ph;

/* RESUME */
const R = D.resume; const C = R.contact;
function expItems(arr){return arr.map(e=>`<div class="r-item"><div><div class="r-role">${e.role}</div><div class="r-org">${e.org}</div></div><div class="r-date">${e.date}</div><div class="r-desc"><ul>${e.bullets.map(b=>`<li>${b}</li>`).join('')}</ul></div></div>`).join('')}
function eduItems(arr){return arr.map(e=>`<div class="r-item"><div><div class="r-role">${e.role}</div><div class="r-org">${e.org}</div></div><div class="r-date">${e.date}</div>${e.desc?`<p class="r-desc">${e.desc}</p>`:''}</div>`).join('')}
